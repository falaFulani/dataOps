# Grafana Datasource Provisioning — Week 8
# ==========================================
# Auto-configures Prometheus as the default datasource.
# Same pattern you'd use in any Grafana-as-code deployment.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "5s"
      httpMethod: POST
    version: 1
