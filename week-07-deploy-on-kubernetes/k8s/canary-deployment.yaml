# =============================================================================
# Canary Deployment — Running Two Model Versions Side by Side
# =============================================================================
# This shows how to canary a new model version alongside the stable version.
# Same pattern you'd use for any service canary at the bank.
#
# Approach: Two Deployments (v1 stable, v2 canary) with traffic splitting
# via NGINX Ingress annotations. In production, you'd likely use Istio
# VirtualService for more granular control.
#
# ML-specific canary signals to watch:
#   - Prediction distribution: is v2 predicting differently than v1?
#   - Confidence scores: is v2 less confident?
#   - Business metrics: are downstream outcomes (fraud caught, approvals) changing?
#   - Standard: latency, error rate, 5xx (same as always)
# =============================================================================

---
# =============================================================================
# STABLE DEPLOYMENT (v1) — receives 90% of traffic
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-service-stable
  namespace: ml-serving
  labels:
    app: model-service
    version: v1
    track: stable
spec:
  replicas: 3
  selector:
    matchLabels:
      app: model-service
      version: v1
      track: stable
  template:
    metadata:
      labels:
        app: model-service
        version: v1
        track: stable
    spec:
      containers:
        - name: model-service
          image: model-service:v1
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: MODEL_VERSION
              value: "1.0.0"
            - name: MODEL_NAME
              value: "iris-classifier"
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
# =============================================================================
# CANARY DEPLOYMENT (v2) — receives 10% of traffic
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-service-canary
  namespace: ml-serving
  labels:
    app: model-service
    version: v2
    track: canary
spec:
  replicas: 1  # Single replica for canary — enough to validate
  selector:
    matchLabels:
      app: model-service
      version: v2
      track: canary
  template:
    metadata:
      labels:
        app: model-service
        version: v2
        track: canary
    spec:
      containers:
        - name: model-service
          image: model-service:v2
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: MODEL_VERSION
              value: "2.0.0"  # New model version
            - name: MODEL_NAME
              value: "iris-classifier"
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
# =============================================================================
# STABLE SERVICE — routes to v1 pods
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: model-service-stable
  namespace: ml-serving
  labels:
    app: model-service
    track: stable
spec:
  type: ClusterIP
  selector:
    app: model-service
    version: v1
    track: stable
  ports:
    - name: http
      port: 80
      targetPort: http

---
# =============================================================================
# CANARY SERVICE — routes to v2 pods
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: model-service-canary
  namespace: ml-serving
  labels:
    app: model-service
    track: canary
spec:
  type: ClusterIP
  selector:
    app: model-service
    version: v2
    track: canary
  ports:
    - name: http
      port: 80
      targetPort: http

---
# =============================================================================
# CANARY INGRESS — Traffic splitting via NGINX annotations
# =============================================================================
# Main ingress for stable traffic (90%)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: model-service-ingress-stable
  namespace: ml-serving
  labels:
    app: model-service
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: model.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: model-service-stable
                port:
                  name: http

---
# Canary ingress (10% of traffic routed to v2)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: model-service-ingress-canary
  namespace: ml-serving
  labels:
    app: model-service
  annotations:
    # NGINX canary annotations — you've used these before
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: "10"  # 10% to canary
spec:
  ingressClassName: nginx
  rules:
    - host: model.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: model-service-canary
                port:
                  name: http

# =============================================================================
# USAGE NOTES:
# =============================================================================
# 1. Deploy both stable and canary deployments
# 2. Apply both ingress resources
# 3. Monitor for 24-48 hours (ML canaries need longer than typical services)
# 4. Watch:
#    - kubectl logs -l track=canary -n ml-serving
#    - Prometheus: compare latency, error rate between v1 and v2
#    - ML metrics: compare prediction distributions between versions
# 5. If canary looks good: scale canary to 25% → 50% → 100%, then promote
# 6. If canary looks bad: delete canary deployment and ingress
#
# With Istio (what you'd actually use at the bank):
# ---
# apiVersion: networking.istio.io/v1beta1
# kind: VirtualService
# metadata:
#   name: model-service
# spec:
#   hosts:
#     - model-service
#   http:
#     - route:
#         - destination:
#             host: model-service-stable
#           weight: 90
#         - destination:
#             host: model-service-canary
#           weight: 10
# =============================================================================
