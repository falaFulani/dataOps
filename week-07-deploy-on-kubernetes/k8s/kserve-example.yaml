# =============================================================================
# KServe InferenceService Example
# =============================================================================
# This shows what the specialized ML serving layer looks like on k8s.
# KServe abstracts away the Deployment, Service, HPA, and Ingress you wrote
# manually in the other files — into a single custom resource.
#
# You don't need KServe for this week's lab (plain k8s is fine for 1-3 models).
# This file is here so you can see the abstraction and evaluate when it makes
# sense for your bank's ML team.
#
# Prerequisites (if you want to actually deploy this):
#   - KServe installed on the cluster (CRDs + controller)
#   - Knative Serving (for scale-to-zero)
#   - Istio or Kourier (for traffic routing)
#   - cert-manager (for TLS)
#
# That's a lot of dependencies — which is why "plain k8s" is simpler to start.
# =============================================================================

---
# =============================================================================
# Example 1: Simple sklearn model served from a storage URI
# =============================================================================
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: iris-classifier
  namespace: ml-serving
  labels:
    team: ml-platform
  annotations:
    # Autoscaling configuration
    autoscaling.knative.dev/target: "10"  # Target 10 concurrent requests per pod
    autoscaling.knative.dev/minScale: "1"  # Don't scale to zero (faster cold start)
    autoscaling.knative.dev/maxScale: "5"
spec:
  predictor:
    # KServe supports multiple model formats out of the box:
    # sklearn, xgboost, lightgbm, tensorflow, pytorch, onnx, triton
    model:
      modelFormat:
        name: sklearn
      # Storage URI — KServe pulls the model artifact automatically
      # Supports: gs://, s3://, az://, pvc://, http://
      storageUri: "s3://ml-models/iris-classifier/v1"
      # Resource allocation (same concepts as your Deployment resources)
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

---
# =============================================================================
# Example 2: Canary rollout with traffic splitting (built into KServe)
# =============================================================================
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: iris-classifier-canary
  namespace: ml-serving
spec:
  predictor:
    # The "default" predictor gets most traffic
    model:
      modelFormat:
        name: sklearn
      storageUri: "s3://ml-models/iris-classifier/v1"
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
    # Canary traffic split — KServe handles this natively
    canaryTrafficPercent: 10
  # Transformer (optional) — pre/post-processing container
  # Runs before/after the predictor, useful for feature engineering
  # transformer:
  #   containers:
  #     - name: feature-transformer
  #       image: my-registry/feature-transformer:latest

---
# =============================================================================
# Example 3: Custom container (your FastAPI app, served via KServe)
# =============================================================================
# If you want KServe's infrastructure (autoscaling, canary, monitoring)
# but want to run your own serving code (the Week 5 FastAPI app):
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: iris-custom-serving
  namespace: ml-serving
spec:
  predictor:
    containers:
      - name: model-service
        image: model-service:latest
        ports:
          - containerPort: 8000
            protocol: TCP
        env:
          - name: MODEL_VERSION
            value: "1.0.0"
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

# =============================================================================
# WHAT KSERVE GIVES YOU (that you'd otherwise build manually):
# =============================================================================
#
# 1. Model storage abstraction — pull from S3/GCS/PVC automatically
# 2. Pre-built model servers — no need to write FastAPI for standard frameworks
# 3. Autoscaling with scale-to-zero — save resources when no traffic
# 4. Canary traffic splitting — built-in, no Istio VirtualService needed
# 5. Standardized prediction API — V1/V2 inference protocols
# 6. Multi-model serving — multiple models on one pod (resource sharing)
# 7. Transformers — sidecar containers for pre/post-processing
# 8. Explainability — optional explainer containers (SHAP, LIME)
# 9. Payload logging — for monitoring and compliance audit
#
# WHEN IT'S WORTH THE COMPLEXITY:
# - Your ML team has 10+ models to serve
# - Data scientists need self-service deployment (they write the YAML above)
# - You want standardized monitoring/logging across all models
# - Scale-to-zero is important (cost savings for infrequent models)
#
# WHEN PLAIN K8S IS BETTER:
# - You have 1-5 models
# - Your team already has k8s expertise (you do)
# - You want full control over the deployment stack
# - You don't want the Knative/Istio dependency chain
# =============================================================================
