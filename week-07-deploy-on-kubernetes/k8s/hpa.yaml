# =============================================================================
# HorizontalPodAutoscaler for Model Service
# =============================================================================
# Standard HPA with one ML-relevant twist:
#   - minReplicas = 2 (never scale to 1 because cold start penalty is high)
#   - CPU target is 70% (inference is bursty, give headroom)
#   - Custom metric placeholder for inference RPS
#
# ML model pods take 10-60s to become ready (model loading), so scaling
# decisions need to be proactive. Set thresholds lower than you might for
# a typical service that starts in 2 seconds.
# =============================================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: model-service-hpa
  namespace: ml-serving
  labels:
    app: model-service
    team: ml-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: model-service
  minReplicas: 2   # Never go below 2 — cold start penalty is too high for ML pods
  maxReplicas: 10
  metrics:
    # -------------------------------------------------------------------------
    # CPU-based scaling (standard)
    # Target 70% instead of 80% because inference latency degrades before
    # CPU hits 100%. Being proactive matters when new pods take 30s+ to start.
    # -------------------------------------------------------------------------
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

    # -------------------------------------------------------------------------
    # Custom metric: inference requests per second (requires Prometheus Adapter)
    #
    # To make this work:
    # 1. Your model service exposes a Prometheus metric (e.g., inference_requests_total)
    # 2. Prometheus scrapes it
    # 3. Prometheus Adapter exposes it to the k8s metrics API
    # 4. HPA reads it via the custom.metrics.k8s.io API
    #
    # Uncomment when you have the Prometheus Adapter configured:
    # -------------------------------------------------------------------------
    # - type: Pods
    #   pods:
    #     metric:
    #       name: inference_requests_per_second
    #     target:
    #       type: AverageValue
    #       averageValue: "100"  # Scale up when each pod averages >100 req/s

  # ---------------------------------------------------------------------------
  # Behavior: control how aggressively the HPA scales up and down
  # ML-specific reasoning:
  #   - Scale up quickly (inference latency is user-facing)
  #   - Scale down slowly (pods are expensive to restart due to model loading)
  # ---------------------------------------------------------------------------
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30   # React quickly to load spikes
      policies:
        - type: Pods
          value: 2                      # Add up to 2 pods at a time
          periodSeconds: 60
        - type: Percent
          value: 50                     # Or scale up by 50%
          periodSeconds: 60
      selectPolicy: Max

    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 minutes before scaling down
      policies:                         # (model load time makes bounce costly)
        - type: Pods
          value: 1                      # Remove 1 pod at a time
          periodSeconds: 120
      selectPolicy: Min
