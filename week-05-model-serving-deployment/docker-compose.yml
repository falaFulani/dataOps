# =============================================================================
# Docker Compose - Local Development
# =============================================================================
# Same pattern as any service you'd run locally.
# `docker-compose up --build` and you're testing.
# =============================================================================

services:
  model-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ml-model-service
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=development
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    # Resource limits (same as you'd set in K8s resource requests/limits)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"
